
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GD Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #0074D9; margin: 0 auto; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #customizer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; display: flex; gap: 10px; }
        .color-btn { width: 30px; height: 30px; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">Уровень: <span id="lvl">1</span> | Прогресс: <span id="prog">0</span>%</div>
    <div id="customizer">
        <div class="color-btn" style="background: #FF4136;" onclick="changeColor('#FF4136')"></div>
        <div class="color-btn" style="background: #FFDC00;" onclick="changeColor('#FFDC00')"></div>
        <div class="color-btn" style="background: #2ECC40;" onclick="changeColor('#2ECC40')"></div>
    </div>
    <canvas id="game"></canvas>

    <script src="game.js"></script>
</body>
</html>
